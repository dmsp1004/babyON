# Test Configuration - H2 In-Memory Database
server.port=0

# Disable secrets profile for tests
spring.profiles.include=

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Settings for H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Disable Flyway for tests
spring.flyway.enabled=false

# H2 Console (optional for debugging tests)
spring.h2.console.enabled=true

# JWT Settings for tests
jwt.secret=test-secret-key-for-testing-purposes-only-must-be-at-least-256-bits-long-key
jwt.expiration=86400000

# Disable OAuth2 for tests - exclude auto configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# OAuth2 Dummy settings for tests (prevents placeholder errors)
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.kakao.client-id=test-kakao-client-id
spring.security.oauth2.client.registration.kakao.client-secret=test-kakao-client-secret
spring.security.oauth2.client.registration.naver.client-id=test-naver-client-id
spring.security.oauth2.client.registration.naver.client-secret=test-naver-client-secret

# AWS S3 mock settings for tests
aws.s3.bucket-name=test-bucket
aws.s3.region=ap-northeast-2
aws.access-key-id=test-access-key
aws.secret-access-key=test-secret-key

# CORS settings for tests
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080

# Logging for tests
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.babyon.childcare=INFO
